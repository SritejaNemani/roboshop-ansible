- name: catalogue configure
  hosts: catalogue
  become: yes
  tasks: 
  - name: enable nodejs 20 
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf: 
      name: nodejs 
      state: present

  - name: create a system user roboshop
    ansible.builtin.user: 
      name: roboshop 
      system: true 
      home: /app 
      shell: /sbin/nologin  
      comment: "Roboshop system user"

  - name: create app directory 
    ansible.builtin.file:
      path: /app
      state: directory


  - name: Download Catalogue 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip

  - name: Unzip the code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: Install dependencies
    community.general.npm:
      path: /app

  - name: copy catalogue service file here
    ansible.builtin.copy: 
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongo repo here
    ansible.builtin.copy: 
      src: mongodb.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongodb client
    ansible.builtin.dnf: 
      name: mongodb-mongosh 
      state: present

  - name: check if products loaded or not
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output
    
  - name:  print the output
    ansible.builtin.debug: 
      msg: "{{ catalogue_output }}"


- name: user configure
  hosts: user
  become: yes
  tasks: 
  - name: enable nodejs 20 
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf: 
      name: nodejs 
      state: present

  - name: create a system user roboshop
    ansible.builtin.user: 
      name: roboshop 
      system: true 
      home: /app 
      shell: /sbin/nologin  
      comment: "Roboshop system user"

  - name: delete the /app directory
    ansible.builtin.file:
      path: /app
      state: absent


  - name: create app directory 
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete user zip filke
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: Download User 
    ansible.builtin.get_url:
      url:  https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip

  - name: Unzip the code
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: Install dependencies
    community.general.npm:
      path: /app

  - name: copy user service file here
    ansible.builtin.copy: 
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: copy user service
    ansible.builtin.templete: 
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start/restart user
    ansible.builtin.service: 
      name: user
      enabled: yes
      state: restarted
  
